{% load static %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crear cuenta — Festival Luciérnagas 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body class="auth-body">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="auth-logo-icono">🌿</div>
            <div class="auth-logo-titulo">Festival Luciérnagas</div>
            <div class="auth-logo-sub">Edición 2026</div>
        </div>

        <h2 class="auth-title">Crear cuenta</h2>
        <p class="auth-subtitle">Únete y reserva tu lugar en el festival</p>

        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn-register">Registrarse</button>
        </form>

        <div class="login-text">
            ¿Ya tienes una cuenta?
            <a href="{% url 'login' %}">Ingresa aquí</a>
        </div>

    </div>
    <a href="{% url 'home' %}" class="auth-volver">← Volver al inicio</a>
</body>
</html>
